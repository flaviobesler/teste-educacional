<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste</title>

<style>
body{
  font-family: arial;
  display: flex;
  justify-content: center;
}

.conteiner{
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  margin-top: 10vh;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  border-radius: 10px;
  width: 300px;
}

.fade-out{opacity:0;transition:0.5s;}
.fade-in{opacity:1;transition:0.5s;}

.opcoes{
  width:100px;
  height:40px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#316dee;
  color:#fff;
}

.selecionado{
  background:#da1608;
}

#proxima{
  width:300px;
  height:60px;
  margin-top:10px;
  background:#08be2f;
  color:#fff;
  border:none;
  border-radius:10px;
}

.teste{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.nivel{
  display:flex;
  gap:10px;
}
#botao, #button{

  border: none;
  width: 300px;
  height: 60px;
  border-radius: 10px;
  background-color: #316dee;
  color: white;
  font-size: 17px;
  margin-top: 10px;
  margin-bottom: 10px;
}
.nivel a{
  background: #4CAF50;
    color: white;
    padding: 10px 14px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 16px;
}
.nivel{
  display: flex;
  justify-content: center;
  align-items: center;

}





</style>

</head>
<body>

<div class="conteiner">

<img src="atena.jpg" width="200">

<button id="botao">instruções</button>

<audio id="introducao" src="instrução.mp3"></audio>

<div class="teste">
  <p id="texto"></p>
  <div id="option1"></div>
  <div id="option2"></div>
  <button id="proxima">próxima</button>
</div>

<div id="res1">
  <h2 id="title1"></h2>
  <p id="resulte"></p>
  <button id="button"></button>
  <div id="levels" class="nivel">
    <a href="nivel_1/nivel1.html">1</a>
    <a href="nivel_2/nivel2.html">2</a>
    <a href="nivel_3/nivel3.html">3</a>
    <a href="nivel_4/nivel4.html">4</a>
  </div>
</div>

</div>

<script src="teste.js"></script>

</body>
</html>
