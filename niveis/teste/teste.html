<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste</title>

<style>
  body{
    font-family: 'arial', sans-serif;
    animation: fade 1s ease forwards;
    display: flex;
    align-items: center;
    justify-content: center;

  }

.conteiner {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  margin-top: 10vh;
  transition: box-shadow 0.5s ease; /* animação da sombra */
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  border-radius: 10px;
  width: 300px;
}

  .botao, .gaia{
    margin: 10px;
  }
  .botao button{
    border: none;
    width: 300px;
    height: 60px;
    border-radius: 10px;
    background-color: #316dee;
    color: white;
    font-size: 17px;
  }


  .fade-out {
    opacity: 0;
    transition: opacity 0.5s;
  }

  .fade-in {
    opacity: 1;
    transition: opacity 0.5s;
    
  }
  .teste{
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  
  .opcoes{
    border: none;
    width: 100px;
    height: 40px;
    border-radius: 10px;
    background-color: #316dee;
    color: white;
    font-size: 12px;
    margin: 5px;
  }

  .selecionado{
 
    border: none;
    width: 100px;
    height: 40px;
    border-radius: 10px;
    background-color: #da1608 !important;
    color: white;
    font-size: 12px;
    margin: 5px;
  }

  #proxima{
    border: none;
    width: 300px;
    height: 60px;
    border-radius: 10px;
    background-color: #08be2f;
    color: white;
    font-size: 17px;
  
  
  }

  @keyframes fade {
    from{ opacity: 0;}
    to{opacity: 1;}
  }
  @keyframes transformacao {
    
    
  }

</style>

</head>
<body>

<div class="conteiner">
  
  <div class="gaia">
    <img src="atena.jpg" width="200">
  </div>

  <div class="botao">
    <button id="botao">instruções</button>
  </div>

  <audio id="introducao" src="instrução.mp3"></audio>

  <div class="teste">
    <p id="texto"></p>
    <div id="botoesOpcao">
      <div id="option1"></div>
      <div id="option2"></div>
    </div>
    <button id="proxima">proxima</button>
  </div>

</div>


<script src="teste.js"></script>

</body>
</html>
