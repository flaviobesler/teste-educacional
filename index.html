<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teste educacional</title>

    <style>
        body{font-family: 'Inter', sans-serif;
        
        }

        .gaia{
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            margin-top: 10vh;
            
            animation: gaia 5s ease forwards;
        }
        .iniciar, .comecar{
            display: flex;
            align-items: center;
            justify-self: center;
        }

        .iniciar button{
            margin-top: 50px;
            width: 200px;
            height: 50px;
            background-color: rgb(49, 109, 238);
            border: solid 1px rgba(231, 226, 226, 0.2);
            border-radius: 20px;
            color:white;
            font-size: 15px;
            cursor: pointer;
            animation: aparecer 3s ease forwards; 
            opacity: 0;
            animation-delay: 12s;
        }

        .nivel{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px;
        }
        .nivel button{
            width: 50px;
            height: 30px;
            background-color: rgb(57, 139, 3);
            border: solid 1px rgba(231, 226, 226, 0.2);
            border-radius: 3px;
            font-size: 20px;
            animation: gaia 5s ease forwards;
            
        }
        .comecar button{
           margin-top: 50px;
            width: 200px;
            height: 50px;
            background-color: rgb(49, 109, 238);
            border: solid 1px rgba(231, 226, 226, 0.2);
            border-radius: 20px;
            color:white;
            font-size: 15px;
            cursor: pointer;
            animation: gaia 5s ease forwards;
            
        }
        .iniciar a, .nivel a {
        text-decoration: none;
        color: white;}
        

        @keyframes gaia {
            from{
                opacity: 0;
            }
            to{
                opacity: 1;
            }
            
        }

        @keyframes aparecer {
            from{
                opacity: 0;
            }

            to{
                opacity: 1;
            }
            
        }




    </style>

</head>
<body>

    <div class="gaia">
        <img src="img/atena.jpg" width="200px" height="auto">
    </div>

    <div>
        <audio src="apresentacao.mp3" id="apresentacao"></audio>
    </div>
    <div class="nivel">
        <button><a href="niveis/nivel_1/nivel1.html">1</a></button>
        <button><a href="niveis/nivel_2/nivel2.html">2</a></button>
        <button><a href="niveis/nivel_3/nivel3.html">3</a></button>
        <button><a href="niveis/nivel_4/nivel4.html">4</a></button>
    </div>

    <div class="comecar" id="iniciar">
        <button>iniciar</button>
    </div>
    
    <div class="iniciar" id="comecar">
        <button><a href="niveis/teste/teste.html">começar?</a></button>
    </div>

    



    <script src="index.js"></script>
</body>
</html>
