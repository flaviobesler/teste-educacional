<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Educacional</title>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

/* Container principal */
.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    width: 320px;
}

/* Imagem Gaia */
.gaia img {
    width: 140px;
    margin-bottom: 20px;
    animation: fade 1s ease;
}

/* Níveis */
.nivel {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px 0;
}

.nivel-btn {
    background: #4CAF50;
    color: white;
    padding: 10px 14px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 16px;
}

/* Botão principal */
.start {
    margin-top: 20px;
    width: 100%;
    padding: 15px;
    background: #316dee;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
}

.start:hover {
    background: #2556c7;
}

/* Animação */
@keyframes fade {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>

</head>

<body>

<div class="container">

    <div class="gaia">
        <img src="img/atena.jpg" alt="Gaia">
    </div>

    <div class="nivel">
        <a href="niveis/nivel_1/nivel1.html" class="nivel-btn">1</a>
        <a href="niveis/nivel_2/nivel2.html" class="nivel-btn">2</a>
        <a href="niveis/nivel_3/nivel3.html" class="nivel-btn">3</a>
        <a href="niveis/nivel_4/nivel4.html" class="nivel-btn">4</a>
    </div>

    <button class="start">Iniciar</button>

</div>

<audio src="apresentacao.mp3" id="apresentacao"></audio>

<script src="index.js"></script>

</body>
</html>
